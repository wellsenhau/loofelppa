<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琉球旅行可不知的注意事項</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; margin: 0; }
        #content { text-align: left; }
    </style>
</head>
<body>
    <div id="content"></div>
    <script>
        const lines = [
            "3...",
            "2...",
            "1..."
        ];
        let i = 0;
        const div = document.getElementById('content');
        function printLine() {
            if (i < lines.length) {
                div.innerHTML = "> " + lines[i] + "<br>";
                i++;
                setTimeout(printLine, 800);
            } else {
                div.innerHTML = "<h1 style='color:red; font-size:3rem; text-align:center;'>🤪 愚人節快樂！<br><span style='font-size:1rem; color:white;'>要天天開心的笑哦😁。</span><br><span style='font-size:1rem; color:white;'>沒病毒，別擔心。</span></h1>";
            }
        }
        printLine();
    </script>
</body>
</html>
